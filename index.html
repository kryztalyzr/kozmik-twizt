<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYZTALYZR | Diamond Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            @keyframes pulse {
    0% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
    50% { opacity: 1; text-shadow: 0 0 20px var(--diamond-glow); }
    100% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
}
#player-container {
    margin-top: 30px;
    padding: 20px;
    border-top: 1px solid var(--glass-border);
    display: none; /* Hidden until you click a song */
}

audio { width: 100%; filter: invert(100%); opacity: 0.8; }
            --silver: #C0C0C0;
            --diamond-glow: rgba(224, 247, 250, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: var(--silver);
            text-shadow: 0 0 15px var(--diamond-glow);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #888;
            margin-bottom: 50px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--silver);
            border-bottom: 1px solid var(--glass-border);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--silver);
            padding: 15px;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            border-radius: 10px;
            display: block;
        }

        .track-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 0 15px var(--diamond-glow);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .links-footer {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            color: var(--silver);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            border: 1px solid var(--silver);
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.4s;
        }

        .social-link:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }
  @keyframes pulse {
    0% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
    50% { opacity: 1; text-shadow: 0 0 20px var(--diamond-glow); }
    100% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
}

#player-container {
    margin-top: 30px;
    padding: 20px;
    border-top: 1px solid var(--glass-border);
    display: none; /* This stays hidden until you click a song */
}

audio { width: 100%; filter: invert(100%); opacity: 0.8; }  </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <header>
            <h1>KRYZTALYZR</h1>
            <div class="subtitle">DIAMOND TRANSMISSION // 2026</div>
        </header>

        <section class="glass-card">
            <h2>LATEST VISUALS</h2>
            <div class="grid">
                <div class="glass-card" style="display: flex; align-items: center; justify-content: center; min-height: 300px; border: 1px dashed var(--silver);">
    <p style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--silver); animation: pulse 2s infinite;">[ VISUAL_DATA_PENDING ]</p>
</div>
            </div>
        </section>
<section class="glass-card">
            <h2>AUDIO FREQUENCIES</h2>
            <div class="grid">
                <button class="track-btn" onclick="playSong('1Mbpw8nzWQSOMviJmEzREtDf2-1dWsU0a')">PHASE_01.wav</button>
                <button class="track-btn" onclick="playSong('1CY2gpRWkf8pTfM21NYpKsYqeWIG-yS4Z')">PHASE_02.wav</button>
                <button class="track-btn" onclick="playSong('1toSurqlJw0-iJPwXPo0D0S4g9wZqfZFs')">PHASE_03.wav</button>
            </div>

            <div id="player-container">
                <p id="now-playing" style="font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 10px;">STREAMING ACTIVE</p>
                <audio id="main-player" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                </audio>
            </div>
        </section>
     <div class="links-footer">
            <a href="https://instagram.com/kryztalyzr" class="social-link">INSTAGRAM</a>
            <a href="https://paypal.me/yourlink" class="social-link">DONATE</a>
        </div>
     <script>
      function playSong(driveId) {
            const player = document.getElementById('main-player');
            const source = document.getElementById('audio-source');
            const container = document.getElementById('player-container');
            
            // This line uses backticks `` so the ID works!
            source.src = `https://docs.google.com/uc?export=download&id=${driveId}`;
            
            container.style.display = "block";
            player.load();
            player.play();
        }
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            flakes = [];
            for (let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                f.y += f.speed;
                if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
