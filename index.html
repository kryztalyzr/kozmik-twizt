<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYZTALYZR | Diamond Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --silver: #C0C0C0;
            --diamond-glow: rgba(224, 247, 250, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* Snow Animation */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: var(--silver);
            text-shadow: 0 0 15px var(--diamond-glow);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #888;
            margin-bottom: 50px;
        }

        /* Glass Panels */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--silver);
            border-bottom: 1px solid var(--glass-border);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        /* Diamond Lightning/Leaf Decor */
        .decor {
            position: absolute;
            font-size: 24px;
            filter: drop-shadow(0 0 5px var(--diamond-glow));
            opacity: 0.6;
        }
        .top-left { top: 15px; left: 15px; }
        .top-right { top: 15px; right: 15px; }

        /* Grid for Tracks */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--silver);
            padding: 15px;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            border-radius: 10px;
        }

        .track-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 0 15px var(--diamond-glow);
        }

        /* Social/Donation Footer */
        .links-footer {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-link {
            color: var(--silver);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            border: 1px solid var(--silver);
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.4s;
        }

        .social-link:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        iframe {
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <header>
            <h1>KRYZTALYZR</h1>
            <div class="subtitle">DIAMOND TRANSMISSION // 2026</div>
        </header>

        <section class="glass-card">
            <span class="decor top-left">⚡</span>
            <span class="decor top-right">🍁</span>
            <h2>LATEST VISUALS</h2>
            <div style="aspect-ratio: 16/9; background: #000; border-radius: 10px;">
                <p style="padding-top: 20%; color: #444;">[ VIDEO FEED SECURED ]</p>
            </div>
        </section>

        <section class="glass-card">
            <span class="decor top-left">💎</span>
            <span class="decor top-right">⚡</span>
            <h2>AUDIO FREQUENCIES</h2>
            <div class="grid">
                <a href="#" class="track-btn">PHASE_01.wav</a>
                <a href="#" class="track-btn">PHASE_02.wav</a>
                <a href="#" class="track-btn">PHASE_03.wav</a>
                <a href="#" class="track-btn">PHASE_04.wav</a>
                <a href="#" class="track-btn">PHASE_05.wav</a>
                <a href="#" class="track-btn">PHASE_06.wav</a>
            </div>
        </section>

        <div class="links-footer">
            <a href="https://instagram.com/yourprofile" class="social-link">INSTAGRAM</a>
            <a href="https://paypal.me/yourlink" class="social-link">DONATE</a>
        </div>
    </div>

    <script>
        // Simple Snow Effect
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            flakes = [];
            for (let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                f.y += f.speed;
                if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
