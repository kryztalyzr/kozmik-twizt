<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            @keyframes pulse {
    0% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
    50% { opacity: 1; text-shadow: 0 0 20px var(--diamond-glow); }
    100% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }

#player-container {

audio { width: 100%; filter: invert(100%); opacity: 0.8; }
            --silver: #C0C0C0;
            --diamond-glow: rgba(224, 247, 250, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: var(--silver);
            text-shadow: 0 0 15px var(--diamond-glow);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #888;
            margin-bottom: 50px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--silver);
            border-bottom: 1px solid var(--glass-border);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--silver);
            padding: 15px;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            border-radius: 10px;
            display: block;
        }

        .track-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 0 15px var(--diamond-glow);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .links-footer {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            color: var(--silver);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            border: 1px solid var(--silver);
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.4s;
        }

        .social-link:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }
  @keyframes pulse {
    0% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
    50% { opacity: 1; text-shadow: 0 0 20px var(--diamond-glow); }
    100% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }
}

#player-container {
    margin-top: 30px;
    padding: 20px;
    border-top: 1px solid var(--glass-border);
    display: none; /* This stays hidden until you click a song */
}

audio { width: 100%; filter: invert(100%); opacity: 0.8; }  </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <header>
            <h1>KRYZTALYZR</h1>
            <div class="subtitle">DIAMOND TRANSMISSION // 2026</div>
        </header>

        <section class="glass-card">
            <h2>LATEST VISUALS</h2>
            <div class="grid">
                <div class="glass-card" style="display: flex; align-items: center; justify-content: center; min-height: 300px; border: 1px dashed var(--silver);">
    <p style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--silver); animation: pulse 2s infinite;">[ VISUAL_DATA_PENDING ]</p>
</div>
            </div>
        </section>
<section class="glass-card">
            <h2>AUDIO FREQUENCIES</h2>
            <div class="grid">
         
            </div>
<button class="track-btn" onclick="playSong('All In My Mind (Full Song).mp3')">All In My Mind</button>
<button class="track-btn" onclick="playSong('wizhbonez (Full Song).mp3')">wizhbonez</button>
<button class="track-btn" onclick="playSong('Clarinetz (Full Song).mp3')">Clarinetz</button>
            <div id="player-container">
                <p id="now-playing" style="font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 10px;">STREAMING ACTIVE</p>
                <audio id="main-player" controls>
                    <source id="audio-source" src="" type="audio/wav">
                </audio>
            </div>
        </section>
     <div class="links-footer">
            <a href="https://instagram.com/kryztalyzr" class="social-link">INSTAGRAM</a>
            <a href="https://paypal.me/yourlink" class="social-link">DONATE</a>
    <style>
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Behind your text */
            pointer-events: none;
        }
    </style>

    <canvas id="snow-canvas"></canvas>

    <script>
        // 1. MP3 Player Logic
        function playSong(fileName) {
            const player = document.getElementById('main-player');
            const source = document.getElementById('audio-source');
            const container = document.getElementById('player-container');
            source.src = fileName;
            container.style.display = "block";
            player.load();
            setTimeout(() => {
                player.play().catch(e => console.error("Playback failed:", e));
            }, 100);
        }

        // 2. Cosmic Dust & Snow System
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; 
                this.speed = Math.random() * 1 + 0.5;
                this.velX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.isSparkle = Math.random() > 0.9; 
            }

            update() {
                this.y += this.speed;
                this.x += this.velX;

                if (this.isSparkle) {
                    this.opacity = Math.abs(Math.sin(Date.now() * 0.002)) * 0.8;
                }

                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                
                if (this.isSparkle) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "white";
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
