<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYZTALYZR | Kozmik Twizt</title>
    <style>
        :root {
            --gold: #d4af37;
            --deep-red: #8b0000;
            --glow-red: #ff0000;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            color: white;
            font-family: 'Orbitron', 'Segoe UI', sans-serif; /* Orbitron gives that tech/cosmic look */
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            font-size: 4rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 10px;
            /* Sleek Diamond Text Effect */
            text-shadow: 2px 2px 0px #444, 4px 4px 0px #000, 0 0 20px var(--glow-red);
            font-weight: 900;
        }

        .sub-heading {
            color: var(--gold);
            letter-spacing: 5px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        section {
            margin-bottom: 60px;
            padding: 30px;
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h2 {
            color: var(--gold);
            border-bottom: 2px solid var(--deep-red);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 2px solid #333;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        iframe:hover {
            transform: scale(1.02);
            border-color: var(--gold);
        }

        /* Music Grid - 6 Slots */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .music-card {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--deep-red);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .music-card:hover {
            background: var(--deep-red);
            border-left: 4px solid var(--gold);
            transform: translateY(-5px);
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>KRYZTALYZR</h1>
            <p class="sub-heading">KOZMIK TWIZT OFFICIAL</p>
        </header>

        <section id="videos">
            <h2>LATEST VIDEOS</h2>
            <div class="video-grid">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
            </div>
        </section>

        <section id="music">
            <h2>AUDIO TRANSMISSIONS</h2>
            <div class="music-grid">
                <a href="LINK_1" class="music-card">TRACK 01</a>
                <a href="LINK_2" class="music-card">TRACK 02</a>
                <a href="LINK_3" class="music-card">TRACK 03</a>
                <a href="LINK_4" class="music-card">TRACK 04</a>
                <a href="LINK_5" class="music-card">TRACK 05</a>
                <a href="LINK_6" class="music-card">TRACK 06</a>
            </div>
        </section>
    </div>

</body>
</html>
