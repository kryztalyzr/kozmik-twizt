<!DOCTYPE html>

#snow-canvas {

      position: relative;

      margin: 0 auto;

    h1 {

letter-spacing: clamp(4px, 2vw, 12px);

    border-radius: 20px;
   padding: 40px 20px;
min-height: 200px;
height: auto;

    padding: 20px;

    }

.pulse-text {
  animation: pulse 2s infinite ease-in-out;
}
    @keyframes pulse {
      0% { opacity: 0.4; text-shadow: 0 0 5px var(--silver); }

            transition: 0.4s;
        }

        .social-link:hover {
            background: #fff;
            color: #000;

        }
        .pulse-text {
  animation: pulse 2s infinite ease-in-out;
}
  @keyframes pulse {

    50% { opacity: 1; text-shadow: 0 0 20px var(--diamond-glow); }

}

#player-container {

audio { width: 100%; filter: invert(100%); opacity: 0.8; }  </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <header>
            <h1>KRYZTALYZR</h1>
            <div class="subtitle">DIAMOND TRANSMISSION // 2026</div>
        </header>
<h2 class="pulse-text">[ VISUAL_DATA_PENDING ]</h2>
        <section class="glass-card">
          
            <div class="grid">
                <div class="glass-card" style="display: flex; align-items: center; justify-content: center; min-height: 300px; border: 1px dashed var(--silver);">
    <p style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--silver); animation: pulse 2s infinite;">[ VISUAL_DATA_PENDING ]</p>
</div>
            </div>
        </section>
<section class="glass-card">
            <h2>AUDIO FREQUENCIES</h2>
          <div class="grid"> 
    <button class="track-btn" onclick="playSong('All In My Mind (Full Song).mp3')">All In My Mind</button>
    <button class="track-btn" onclick="playSong('wizhbonez (Full Song).mp3')">wizhbonez</button>
    <button class="track-btn" onclick="playSong('Clarinetz (Full Song).mp3')">Clarinetz</button>
</div>
            <div id="player-container">
                <p id="now-playing" style="font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 10px;">STREAMING ACTIVE</p>
                <audio id="main-player" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                </audio>
            </div>
        </section>
     <div class="links-footer">
            <a href="https://instagram.com/kryztalyzr" class="social-link">INSTAGRAM</a>
            <a href="https://paypal.me/yourlink" class="social-link">DONATE</a>
         <script>
    // --- AUDIO LOGIC ---
    function playSong(fileName) {
        const playerContainer = document.getElementById('player-container');
        const audio = document.getElementById('main-player');
        const source = document.getElementById('audio-source');

        // This matches the file names in your GitHub repo exactly
        source.src = fileName;
        playerContainer.style.display = 'block';
        audio.load();
        audio.play();
        
        document.getElementById('now-playing').innerText = "NOW STREAMING: " + fileName.replace(' (Full Song).mp3', '');
    }

    // --- SNOW LOGIC ---
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, snowflakes;

    function initSnow() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        snowflakes = Array.from({ length: 120 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 3 + 1,
            d: Math.random() * 1
        }));
    }

    function drawSnow() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.beginPath();
        snowflakes.forEach(f => {
            ctx.moveTo(f.x, f.y);
            ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
        });
        ctx.fill();
        moveSnow();
    }

    function moveSnow() {
        snowflakes.forEach(f => {
            f.y += Math.pow(f.d, 2) + 1;
            if (f.y > height) f.y = -5;
        });
    }

    window.addEventListener('resize', initSnow);
    initSnow();
    setInterval(drawSnow, 30);
</script>
</body>
